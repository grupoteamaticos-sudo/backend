services:
  postgres:
    image: postgres:16
    container_name: bienes_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234567A
      POSTGRES_DB: bienes_logistica
    ports:
      - "5433:5432"
    volumes:
      - pgdata_bienes:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bienes_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata_bienes: